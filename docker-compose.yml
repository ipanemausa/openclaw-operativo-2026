version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: openclaw_app
    ports:
      - "8080:5000"     # Flask expuesto en 8080
    depends_on:
      - db

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: openclaw_gateway
    ports:
      - "8080:8080"     # Gateway fijo en 8080
    environment:
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=openclaw
      - DB_HOST=db
    depends_on:
      - app
      - db

  db:
    image: postgres:15
    container_name: openclaw_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openclaw
    ports:
      - "5432:5432"

  # ========== AGENTES NUEVOS ==========

  video_agent:
    build:
      context: ./agents/video_agent
      dockerfile: Dockerfile
    container_name: openclaw_video_agent
    ports:
      - "8081:5000"
    environment:
      - AGENT_NAME=video_agent
      - AGENT_PORT=5000
    volumes:
      - ./agents/video_agent/videos:/app/videos
      - ./agents/video_agent/output:/app/output
    depends_on:
      - app

  marketing_generator:
    build:
      context: ./agents/marketing_generator
      dockerfile: Dockerfile
    container_name: openclaw_marketing_generator
    ports:
      - "8082:5000"
    environment:
      - AGENT_NAME=marketing_generator
      - AGENT_PORT=5000
      - HB_JEWELRY_PRICE_MIN=15
      - HB_JEWELRY_PRICE_MAX=50
      - HB_JEWELRY_STYLE=contemporary
      - HB_JEWELRY_AGE_MIN=18
      - HB_JEWELRY_AGE_MAX=45
      - HB_JEWELRY_PRODUCT_TYPES=rings,necklaces,bracelets,earrings,sets
    volumes:
      - ./agents/marketing_generator/products:/app/products
      - ./agents/marketing_generator/output:/app/output
    depends_on:
      - app

  shopify_integration:
    build:
      context: ./agents/shopify_integration
      dockerfile: Dockerfile
    container_name: openclaw_shopify_integration
    ports:
      - "8083:5000"
    environment:
      - AGENT_NAME=shopify_integration
      - AGENT_PORT=5000
      - SHOPIFY_STORE_URL=${SHOPIFY_STORE_URL}
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - SHOPIFY_API_VERSION=2024-01
    volumes:
      - ./agents/shopify_integration/config:/app/config
      - ./agents/shopify_integration/logs:/app/logs
    depends_on:
      - app

  # ========== INTEGRACIONES CRÍTICAS ==========

  slack_bot:
    build:
      context: .
      dockerfile: Dockerfile.slackbot
    container_name: openclaw_slack_bot
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: openclaw_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: openclaw_vector_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
