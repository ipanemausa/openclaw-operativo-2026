<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OpenClaw Dashboard</title>
    <style>
        body { font-family: Arial; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; margin: 0; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; background: rgba(0,0,0,0.3); padding: 40px; border-radius: 15px; max-width: 600px; }
        h1 { margin-bottom: 20px; }
        .services { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .service { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; }
        .status { display: inline-block; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #4ade80; color: black; }
        a { display: inline-block; margin-top: 30px; padding: 15px 40px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 30px; font-weight: bold; }
        a:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>OpenClaw Control 2026</h1>
        <p>Estado operativo de los servicios</p>
        <div class="services">
            <div class="service"><h3>Webhook</h3><span class="status">ACTIVO</span></div>
            <div class="service"><h3>Database</h3><span class="status">CONECTADA</span></div>
            <div class="service"><h3>Gateway</h3><span class="status">OPERATIVO</span></div>
        </div>
        <a href="/chat">Acceder al Panel de Control</a>
    </div>
</body>
</html>
