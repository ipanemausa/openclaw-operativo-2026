services:
  claw-orchestrator:
    build: ./claw-orchestrator
    container_name: claw-orchestrator
    restart: always
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./claw-estado.json:/app/claw-estado.json
      - C:\openclaw\hb-jewelry:/frontend

  openclaw_app:
    build: ./app
    container_name: openclaw_app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - claw-orchestrator

  redis:
    image: redis:7-alpine
    container_name: openclaw_redis
    restart: always
    ports:
      - "6379:6379"

  video_veo_worker:
    build:
      context: ./agents/video_veo
      dockerfile: Dockerfile.txt
    container_name: video_veo_worker
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  chat_worker:
    build:
      context: ./agents/chat_worker
      dockerfile: Dockerfile
    container_name: chat_worker
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  gateway:
    build: ./gateway
    container_name: openclaw_gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PICKAXE_API_URL=${PICKAXE_API_URL}
      - PICKAXE_API_KEY=${PICKAXE_API_KEY}

  nginx:
    image: nginx:alpine
    container_name: openclaw_nginx

    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - gateway
      - financial_rag_worker
      - voice_worker

  qdrant:
    image: qdrant/qdrant
    container_name: openclaw_qdrant
    restart: always
    ports:
      - "6333:6333"

  financial_rag_worker:
    build:
      context: ./agents/financial_rag_worker
      dockerfile: Dockerfile
    container_name: financial_rag_worker
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant

  voice_worker:
    build:
      context: ./agents/voice_worker
      dockerfile: Dockerfile
    container_name: voice_worker
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
