version: "3.9"

services:
  db:
    image: postgres:15
    container_name: openclaw_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openclaw
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw_app
    ports:
      - "5000:5000"
    depends_on:
      - db

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: openclaw_gateway
    ports:
      - "8080:8080"
    depends_on:
      - db
      - app

volumes:
  db_data:
