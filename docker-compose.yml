services:
  claw-orchestrator:
    build: ./claw-orchestrator
    container_name: claw-orchestrator
    restart: always
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./claw-estado.json:/app/claw-estado.json
      - ./frontend/src:/frontend/src
    networks:
      - claw-net
  openclaw_app:
    build: ./app
    container_name: openclaw_app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - claw-orchestrator
    networks:
      - claw-net
  redis:
    image: redis:7-alpine
    container_name: openclaw_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - claw-net
  video_veo_worker:
    build:
      context: ./agents/video_veo
      dockerfile: Dockerfile.txt
    container_name: video_veo_worker
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - claw-net
  gateway:
    build: ./gateway
    container_name: openclaw_gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PICKAXE_API_KEY=${PICKAXE_API_KEY}
      - PICKAXE_API_URL=https://api.pickaxe.co/v1
    depends_on:
      - claw-orchestrator
    networks:
      - claw-net
  chat_worker:
    build:
      context: ./agents/chat_worker
      dockerfile: Dockerfile
    container_name: chat_worker
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - claw-net
networks:
  claw-net:
    driver: bridge

