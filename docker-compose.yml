version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: scripts/Dockerfile.app
    container_name: openclaw_app
    ports:
      - "5000:5000"
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: scripts/Dockerfile
    container_name: openclaw_gateway
    ports:
      - "18789:18789"
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: openclaw_db
    environment:
      POSTGRES_USER: ocuser
      POSTGRES_PASSWORD: ocpass
      POSTGRES_DB: ocdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
