@"
version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: openclaw_app
    ports:
      - "8080:5000"
      - "18789:5000"
    env_file:
      - .env
    depends_on:
      - db

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: openclaw_gateway
    ports:
      - "8090:8080"
    environment:
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=openclaw
      - DB_HOST=db
    env_file:
      - .env
    depends_on:
      - app
      - db

  db:
    image: postgres:15
    container_name: openclaw_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openclaw
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_data:
"@ | Set-Content docker-compose.yml
