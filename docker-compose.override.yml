version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app   # usa el Dockerfile correcto
    volumes:
      - .:/app                     # monta tu código para desarrollo
    ports:
      - "5000:5000"                # mantiene el mapeo consistente
    # ⚠️ Se elimina el "command: python webhook_globy.py"
    # para que se respete el CMD del Dockerfile (Gunicorn en 5000)
