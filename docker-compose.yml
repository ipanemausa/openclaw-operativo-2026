

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: openclaw_app
    ports:
      - "8080:5000"     # Flask expuesto en 8080
      - "18789:5000"    # acceso alternativo en 18789
    depends_on:
      - db

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: openclaw_gateway
    ports:
      - "8090:8080"     # gateway expuesto en 8090 para evitar choque
    environment:
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=openclaw
      - DB_HOST=db
    depends_on:
      - app
      - db

  db:
    image: postgres:15
    container_name: openclaw_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openclaw
    ports:
      - "5432:5432"
