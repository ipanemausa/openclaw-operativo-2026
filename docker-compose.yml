version: "3.9"

services:
  db:
    image: postgres:15
    container_name: openclaw_db
    environment:
      POSTGRES_DB: ocdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ocpass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: openclaw_app
    depends_on:
      - db
    ports:
      - "5000:5000"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway   # asegúrate que este Dockerfile ejecute "python gateway.py"
    container_name: openclaw_gateway
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - FLASK_APP=gateway.py
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=8080

volumes:
  db_data:
