services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile   # asegúrate que este Dockerfile ejecute "python gateway.py"
    container_name: openclaw_gateway
    ports:
      - "8080:8080"            # expone el puerto del contenedor hacia tu host
    depends_on:
      - db                     # espera a que la base esté lista
    environment:
      - FLASK_APP=gateway.py
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=8080

